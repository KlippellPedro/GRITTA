<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Carregando...</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../../statics/img/icons/loja-icon.png" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/global.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/menu.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/index.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/pages/categoria.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <gritta-header></gritta-header>
    <main class="destaques">
      <h2 id="titulo-categoria" class="secao-titulo">CARREGANDO...</h2>

      <!-- Gatilho do Filtro -->
      <div class="filter-controls">
        <button id="btn-open-filters" class="btn-filter-trigger">
          <img src="../../statics/img/icons/filtro.png" alt="Filtros" />
          <span>FILTRAR</span>
        </button>
      </div>

      <!-- Menu Lateral de Filtros -->
      <div id="filter-sidebar" class="filter-sidebar">
        <div class="sidebar-header">
          <h3>FILTROS</h3>
          <button id="btn-close-filters" class="btn-close-sidebar">&times;</button>
        </div>

        <div class="sidebar-content">
          <div class="filter-group">
            <label>DISPONIBILIDADE</label>
            <div class="size-filter-chips" id="stock-filters">
              <button class="size-chip active" data-stock="all">TODOS</button>
              <button class="size-chip" data-stock="in-stock">DISPONÍVEL</button>
              <button class="size-chip" data-stock="out-of-stock">ESGOTADO</button>
            </div>
          </div>

          <div class="filter-group">
            <label>TAMANHO</label>
            <div class="size-filter-chips" id="size-filters">
              <button class="size-chip active" data-size="all">ALL</button>
              <button class="size-chip" data-size="P">P</button>
              <button class="size-chip" data-size="M">M</button>
              <button class="size-chip" data-size="G">G</button>
              <button class="size-chip" data-size="GG">GG</button>
            </div>
          </div>

          <button id="btn-apply-filters" class="btn-apply">APLICAR FILTROS</button>
        </div>
      </div>
      <div id="filter-overlay" class="filter-overlay"></div>

      <div class="vitrine" id="vitrine-categoria">
        <!-- Produtos injetados pelo categoria.js -->
      </div>
    </main>
    <gritta-footer></gritta-footer>
  </body>
</html>
