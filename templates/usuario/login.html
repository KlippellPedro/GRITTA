<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Login</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../../statics/img/icons/loja-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../statics/css/reset.css" />
    <link rel="stylesheet" href="../../statics/css/global.css" />
    <link rel="stylesheet" href="../../statics/css/menu.css" />
    <link rel="stylesheet" href="../../statics/css/usuario/login.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/login.js" defer></script>
  </head>
  <body>
    <gritta-header></gritta-header>

    <main class="login-main">
      <div class="login-container">
        <p class="login-eyebrow">✦ Bem-vindo de volta</p>
        <h2 class="login-titulo">IDENTIFICAÇÃO</h2>

        <form id="loginForm" class="login-form">
          <div id="login-message" class="message-area"></div>

          <div class="input-group">
            <label for="email">E-MAIL</label>
            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
          </div>

          <div class="input-group">
            <label for="password">SENHA</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
              <span class="toggle-password">
                <img src="../../statics/img/icons/olho-fechado.png" alt="Ver Senha" />
              </span>
            </div>
          </div>

          <div class="login__check">
            <div class="login__check-box">
              <input type="checkbox" id="user-check" />
              <label for="user-check" style="cursor:none">Manter-me logado</label>
            </div>
            <a href="recuperar-senha.html" class="login__forgot">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn-login">ENTRAR NA CONTA</button>

          <div class="login__register">
            Ainda não tem conta? <a href="cadastro.html">Cadastre-se grátis</a>
          </div>
        </form>
      </div>
    </main>

    <gritta-footer></gritta-footer>
  </body>
</html>
