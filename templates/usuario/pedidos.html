<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Meus Pedidos</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../../statics/img/icons/loja-icon.png" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/global.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/menu.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/pedidos.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/pedidos.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <gritta-header></gritta-header>

    <main class="pedidos-main">
      <h2 class="pedidos-titulo">MEUS PEDIDOS</h2>

      <div id="pedidos-lista" class="pedidos-container">
        <!-- Pedidos injetados pelo JS -->
        <p class="loading-msg">Buscando seus pedidos...</p>
      </div>
    </main>

    <!-- Modal de Detalhes do Pedido -->
    <div id="modal-pedido" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="detalhe-titulo">DETALHES DO PEDIDO</h3>
          <button id="btn-fechar-modal" class="btn-close">&times;</button>
        </div>
        <div id="detalhes-itens-lista" class="detalhes-itens-container">
          <!-- Itens injetados pelo JS -->
        </div>
      </div>
    </div>

    <gritta-footer></gritta-footer>
  </body>
</html>
