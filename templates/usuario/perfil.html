<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Minha Conta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../../statics/img/icons/loja-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../statics/css/reset.css" />
    <link rel="stylesheet" href="../../statics/css/global.css" />
    <link rel="stylesheet" href="../../statics/css/menu.css" />
    <link rel="stylesheet" href="../../statics/css/usuario/perfil.css" />
    <link rel="stylesheet" href="../../statics/css/usuario/perfil-modais.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/perfil.js" defer></script>
  </head>
  <body>
    <gritta-header></gritta-header>

    <main class="perfil-main">
      <div class="perfil-container">

        <!-- Cabeçalho da página -->
        <div class="perfil-header">
          <div>
            <p class="perfil-eyebrow">✦ Área do Cliente</p>
            <h2 class="perfil-titulo">MINHA CONTA</h2>
          </div>
          <button id="btn-logout" class="btn-logout-link">Sair da conta</button>
        </div>

        <!-- Grid principal -->
        <div class="perfil-grid">

          <!-- Dados Pessoais -->
          <section class="perfil-section">
            <h3>DADOS PESSOAIS</h3>
            <div class="info-card">
              <div class="info-group">
                <label>NOME COMPLETO</label>
                <p id="user-nome">Carregando...</p>
              </div>
              <div class="info-group">
                <label>E-MAIL</label>
                <p id="user-email">Carregando...</p>
              </div>
              <div class="info-group">
                <label>TELEFONE</label>
                <p id="user-telefone">—</p>
              </div>
              <div class="info-group">
                <label>CPF</label>
                <p id="user-cpf">—</p>
              </div>
              <button class="btn-editar" id="btn-abrir-modal">EDITAR DADOS</button>
            </div>
          </section>

          <!-- Endereços -->
          <section class="perfil-section">
            <h3>MEUS ENDEREÇOS</h3>
            <div id="lista-enderecos" class="enderecos-grid">
              <!-- Injetado pelo perfil.js -->
            </div>
            <button class="btn-editar" id="btn-novo-endereco" style="margin-top:20px">
              + ADICIONAR ENDEREÇO
            </button>
          </section>

          <!-- Sidebar: acesso rápido -->
          <aside class="perfil-sidebar">
            <div class="sidebar-box">
              <h3>ACESSO RÁPIDO</h3>
              <a href="pedidos.html" class="btn-editar" style="display:block;margin-bottom:12px;text-align:center;text-decoration:none">
                📦 MEUS PEDIDOS
              </a>
              <a href="favoritos.html" class="btn-editar" style="display:block;text-align:center;text-decoration:none">
                🤍 FAVORITOS
              </a>
            </div>
          </aside>

        </div>
      </div>
    </main>

    <!-- Modal: Editar Dados -->
    <div id="modal-perfil" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>EDITAR DADOS</h3>
          <button id="btn-fechar-modal" class="btn-close">&times;</button>
        </div>
        <form id="form-editar-perfil">
          <div id="modal-message" class="modal-message"></div>
          <div class="input-group">
            <label for="edit-nome">NOME COMPLETO</label>
            <input type="text" id="edit-nome" required />
          </div>
          <div class="input-group">
            <label for="edit-telefone">TELEFONE</label>
            <input type="text" id="edit-telefone" placeholder="(00) 00000-0000" />
          </div>
          <div class="modal-actions">
            <button type="button" id="btn-cancelar" class="btn-secundario">CANCELAR</button>
            <button type="submit" class="btn-login">SALVAR</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal: Novo Endereço -->
    <div id="modal-endereco" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>NOVO ENDEREÇO</h3>
          <button id="btn-fechar-addr" class="btn-close">&times;</button>
        </div>
        <form id="form-endereco">
          <div class="input-group">
            <label for="addr-cep">CEP</label>
            <input type="text" id="addr-cep" placeholder="00000-000" required maxlength="9" />
          </div>
          <div class="input-group">
            <label for="addr-rua">LOGRADOURO</label>
            <input type="text" id="addr-rua" required />
          </div>
          <div style="display:flex;gap:12px">
            <div class="input-group" style="flex:1">
              <label for="addr-numero">NÚMERO</label>
              <input type="text" id="addr-numero" required />
            </div>
            <div class="input-group" style="flex:2">
              <label for="addr-bairro">BAIRRO</label>
              <input type="text" id="addr-bairro" required />
            </div>
          </div>
          <div style="display:flex;gap:12px">
            <div class="input-group" style="flex:2">
              <label for="addr-cidade">CIDADE</label>
              <input type="text" id="addr-cidade" required />
            </div>
            <div class="input-group" style="flex:1">
              <label for="addr-estado">UF</label>
              <input type="text" id="addr-estado" maxlength="2" required />
            </div>
          </div>
          <button type="submit" class="btn-login" style="width:100%;margin-top:20px">
            SALVAR ENDEREÇO
          </button>
        </form>
      </div>
    </div>

    <gritta-footer></gritta-footer>
  </body>
</html>
