<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Perfil</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../../statics/img/icons/loja-icon.png" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/global.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/menu.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/perfil.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/perfil-modais.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/perfil.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <gritta-header></gritta-header>

    <main class="perfil-main">
      <div class="perfil-container">
        <div class="perfil-header">
          <h2 class="perfil-titulo">MINHA CONTA</h2>
          <button id="btn-logout" class="btn-logout-link">Sair da conta</button>
        </div>

        <div class="perfil-grid">
          <!-- Card de Informações Pessoais -->
          <section class="perfil-section">
            <h3>DADOS PESSOAIS</h3>
            <div class="info-card">
              <div class="info-group">
                <label>NOME COMPLETO</label>
                <p id="user-nome">Carregando...</p>
              </div>
              <div class="info-group">
                <label>E-MAIL</label>
                <p id="user-email">Carregando...</p>
              </div>
              <div class="info-group">
                <label>TELEFONE</label>
                <p id="user-telefone">Carregando...</p>
              </div>
              <div class="info-group">
                <label>CPF</label>
                <p id="user-cpf">Carregando...</p>
              </div>
              <button class="btn-editar" id="btn-abrir-modal">EDITAR DADOS</button>
            </div>
          </section>

          <!-- Seção de Endereços -->
          <section class="perfil-section">
            <h3>MEUS ENDEREÇOS</h3>
            <div id="lista-enderecos" class="enderecos-grid">
              <!-- Injetado pelo JS -->
            </div>
            <button class="btn-editar" id="btn-novo-endereco" style="margin-top: 20px">ADICIONAR NOVO ENDEREÇO</button>
          </section>

          <!-- Espaço para Endereços ou Pedidos (Futuro) -->
          <aside class="perfil-sidebar">
            <div class="sidebar-box">
              <h3>MEUS PEDIDOS</h3>
              <p class="empty-msg">Você ainda não realizou pedidos.</p>
              <a href="../index.html" class="btn-shop">IR PARA A LOJA</a>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <!-- Modal de Edição -->
    <div id="modal-perfil" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>EDITAR MEUS DADOS</h3>
          <button id="btn-fechar-modal" class="btn-close">&times;</button>
        </div>
        <form id="form-editar-perfil">
          <div class="input-group">
            <label for="edit-nome">NOME COMPLETO</label>
            <input type="text" id="edit-nome" required />
          </div>
          <div class="input-group">
            <label for="edit-telefone">TELEFONE</label>
            <input type="text" id="edit-telefone" required />
          </div>
          <div class="modal-actions">
            <button type="button" id="btn-cancelar" class="btn-secundario">CANCELAR</button>
            <button type="submit" class="btn-login">SALVAR ALTERAÇÕES</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal de Novo Endereço -->
    <div id="modal-endereco" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>NOVO ENDEREÇO</h3>
          <button id="btn-fechar-addr" class="btn-close">&times;</button>
        </div>
        <form id="form-endereco">
          <div class="input-group">
            <label for="addr-cep">CEP</label>
            <input type="text" id="addr-cep" placeholder="00000-000" required />
          </div>
          <div class="input-group">
            <label for="addr-rua">RUA</label>
            <input type="text" id="addr-rua" required />
          </div>
          <div style="display: flex; gap: 10px">
            <div class="input-group" style="flex: 1">
              <label for="addr-numero">NÚMERO</label>
              <input type="text" id="addr-numero" required />
            </div>
            <div class="input-group" style="flex: 1">
              <label for="addr-bairro">BAIRRO</label>
              <input type="text" id="addr-bairro" required />
            </div>
          </div>
          <div style="display: flex; gap: 10px">
            <div class="input-group" style="flex: 2">
              <label for="addr-cidade">CIDADE</label>
              <input type="text" id="addr-cidade" required />
            </div>
            <div class="input-group" style="flex: 1">
              <label for="addr-estado">UF</label>
              <input type="text" id="addr-estado" maxlength="2" required />
            </div>
          </div>
          <button type="submit" class="btn-login" style="width: 100%; margin-top: 20px">SALVAR ENDEREÇO</button>
        </form>
      </div>
    </div>

    <gritta-footer></gritta-footer>
  </body>
</html>
