<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Detalhes do Produto</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="../../statics/img/icons/favicon.png" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/global.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/menu.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/produto.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/produto.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      .avaliacoes-section { max-width: 1100px; margin: 10px auto 50px; padding: 0 5%; }
      .avaliacoes-title { font-family: "Bebas Neue", sans-serif; font-size: 2rem; letter-spacing: 2px; margin-bottom: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
      .avaliacoes-resumo { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
      .aval-media { font-family: "Bebas Neue", sans-serif; font-size: 2.8rem; line-height: 1; }
      .aval-stars { color: #f5a623; font-size: 1.2rem; letter-spacing: 2px; }
      .aval-stars .empty { color: #ddd; }
      .aval-total { color: #888; font-size: .85rem; }
      .avaliacao-form { background: #f8f8f8; border: 1px solid #eee; padding: 20px; margin-bottom: 26px; }
      .avaliacao-form h3 { font-family: "Bebas Neue", sans-serif; font-size: 1.3rem; letter-spacing: 1px; margin-bottom: 12px; }
      .star-pick { font-size: 1.8rem; color: #ddd; cursor: pointer; display: inline-flex; gap: 4px; margin-bottom: 12px; }
      .star-pick span:hover, .star-pick span.on { color: #f5a623; }
      .avaliacao-form textarea { width: 100%; min-height: 70px; padding: 10px; border: 1px solid #ddd; font-family: "Montserrat", sans-serif; font-size: .85rem; resize: vertical; box-sizing: border-box; }
      .avaliacao-form button { margin-top: 12px; background: #111; color: #fff; border: none; padding: 12px 24px; font-family: "Bebas Neue", sans-serif; font-size: 1.05rem; letter-spacing: 1px; cursor: pointer; }
      .avaliacao-form button:hover { background: var(--accent); }
      .avaliacao-form .aval-msg { font-size: .8rem; margin-top: 10px; min-height: 16px; }
      .aval-login-hint { color: #888; font-size: .85rem; margin-bottom: 24px; }
      .aval-login-hint a { color: var(--accent); font-weight: 700; }
      .aval-item { border-bottom: 1px solid #eee; padding: 16px 0; }
      .aval-item-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
      .aval-item-nome { font-weight: 700; font-size: .9rem; }
      .aval-item-stars { color: #f5a623; font-size: .9rem; letter-spacing: 1px; }
      .aval-item-stars .empty { color: #ddd; }
      .aval-item-data { color: #aaa; font-size: .75rem; margin-left: auto; }
      .aval-item-texto { color: #555; font-size: .88rem; line-height: 1.5; }
      .aval-vazio { color: #888; font-size: .9rem; }
    </style>
  </head>
  <body>
    <gritta-header></gritta-header>

    <main class="produto-main">
      <div id="loading-product" class="loading">Buscando detalhes da peça...</div>

      <div id="product-content" class="produto-grid" style="display: none">
        <!-- Lado Esquerdo: Galeria -->
        <div class="produto-galeria">
          <div class="main-image-container">
            <img id="main-product-img" src="" alt=""
                 onerror="this.onerror=null;this.src=window.resolveStaticPath(null)" />
          </div>
          <div class="galeria-thumbs" id="galeria-thumbs"></div>
        </div>

        <!-- Lado Direito: Info e Compra -->
        <div class="produto-detalhes">
          <h1 id="product-name">NOME DO PRODUTO</h1>
          <div id="product-badges"></div>
          <!-- Placeholder para badges como "ÚLTIMAS PEÇAS" -->
          <p id="product-price" class="product-price">R$ 0,00</p>

          <div class="product-description">
            <p id="product-desc"></p>
          </div>

          <div class="selection-group">
            <label>ESCOLHA O TAMANHO</label>
            <div id="variacoes-container">
              <!-- Injetado pelo JS -->
            </div>
          </div>

          <div class="selection-group">
            <label>QUANTIDADE</label>
            <div class="qty-selector">
              <button onclick="changeQty(-1)">-</button>
              <span id="qty-value">1</span>
              <button onclick="changeQty(1)">+</button>
            </div>
          </div>

          <button id="btn-add-cart" class="btn-add-cart">ADICIONAR À SACOLA</button>
        </div>
      </div>
    </main>

    <section class="avaliacoes-section">
      <div class="avaliacoes-container">
        <h2 class="avaliacoes-title">AVALIAÇÕES</h2>
        <div id="avaliacoes-resumo" class="avaliacoes-resumo">
          <p class="aval-vazio">Carregando avaliações…</p>
        </div>
        <div id="avaliacao-form-wrap"></div>
        <div id="avaliacoes-lista" class="avaliacoes-lista"></div>
      </div>
    </section>

    <section class="related-section">
      <div class="related-container">
        <h2 class="related-title">VOCÊ TAMBÉM PODE GOSTAR</h2>
        <div id="related-products-grid" class="related-grid"></div>
      </div>
    </section>

    <gritta-footer></gritta-footer>
  </body>
</html>
