<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Recuperar Senha</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../../statics/img/icons/loja-icon.png" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/global.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/menu.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/login.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/recuperar-senha.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/recuperar-senha.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <gritta-header></gritta-header>

    <main class="login-main">
      <div class="login-container">
        <h2 class="login-titulo">RECUPERAR SENHA</h2>
        <p
          style="
            font-family: &quot;Montserrat&quot;, sans-serif;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            line-height: 1.4;
          "
        >
          Informe seu e-mail cadastrado para receber as instruções de recuperação de senha.
        </p>
        <form id="recoverForm" class="login-form">
          <div id="recover-message" class="message-area"></div>

          <div class="input-group">
            <label for="email">E-MAIL</label>
            <input type="email" id="email" placeholder="seu@email.com" required />
          </div>

          <button type="submit" class="btn-login">ENVIAR INSTRUÇÕES</button>

          <div class="login__register">Lembrou sua senha? <a href="login.html">Voltar para o Login</a></div>
        </form>
      </div>
    </main>

    <gritta-footer></gritta-footer>
  </body>
</html>
