<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Nova Senha</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="../../statics/img/icons/favicon.png" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/global.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/menu.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/login.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/resetar-senha.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/resetar-senha.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <gritta-header></gritta-header>

    <main class="login-main">
      <div class="login-container">
        <div class="reset-steps">
          <span class="reset-step feito" data-num="1">E-mail</span>
          <span class="reset-step feito" data-num="2">Código</span>
          <span class="reset-step ativo" data-num="3">Nova senha</span>
        </div>

        <p class="login-eyebrow">✦ Quase lá</p>
        <h2 class="login-titulo">NOVA SENHA</h2>
        <form id="resetForm" class="login-form" novalidate>
          <div id="reset-message" class="message-area"></div>
          <p class="reset-hint">Código verificado pra <strong id="email-alvo"></strong>. Escolha sua nova senha — mínimo 6 caracteres, com letras e números.</p>

          <div class="input-group">
            <label for="password">NOVA SENHA</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" />
              <span class="toggle-password">
                <img src="../../statics/img/icons/olho-fechado.png" alt="Ver Senha" />
              </span>
            </div>
          </div>

          <div class="input-group">
            <label for="confirm-password">CONFIRMAR NOVA SENHA</label>
            <div class="password-wrapper">
              <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password" />
              <span class="toggle-password">
                <img src="../../statics/img/icons/olho-fechado.png" alt="Ver Senha" />
              </span>
            </div>
          </div>

          <button type="submit" class="btn-login">REDEFINIR SENHA</button>
          <p class="reset-resend"><a href="recuperar-senha.html">‹ Começar de novo</a></p>
        </form>
      </div>
    </main>

    <gritta-footer></gritta-footer>
  </body>
</html>
