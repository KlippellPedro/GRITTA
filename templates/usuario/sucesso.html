<!doctype html>
<html lang="pt-br">
  <head>
    <title>GR!TTA | Pedido Confirmado</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../../statics/img/icons/loja-icon.png" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/global.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/menu.css" />
    <link rel="stylesheet" type="text/css" href="../../statics/css/usuario/sucesso.css" />
    <script src="../../statics/js/components.js" defer></script>
    <script src="../../statics/js/config.js" defer></script>
    <script src="../../statics/js/menu.js" defer></script>
    <script src="../../statics/js/usuario/sucesso.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <gritta-header></gritta-header>

    <main class="sucesso-main">
      <div class="sucesso-container">
        <div class="icon-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>

        <h1 class="sucesso-titulo">PEDIDO CONFIRMADO!</h1>
        <p class="sucesso-sub">Obrigado por escolher a GR!TTA. Seu estilo está a caminho.</p>

        <div class="order-info-boxes">
          <div class="order-box">
            <span>NÚMERO DO PEDIDO</span>
            <strong id="display-pedido-id">#0000</strong>
          </div>
          <div class="order-box">
            <span>TOTAL PAGO</span>
            <strong id="display-pedido-total">R$ 0,00</strong>
          </div>
        </div>

        <div id="resumo-itens-sucesso" class="sucesso-items-lista">
          <!-- Itens injetados pelo JS -->
        </div>

        <p class="info-email">Enviamos os detalhes e o comprovante para o seu e-mail.</p>

        <div class="sucesso-actions">
          <a href="pedidos.html" class="btn-sucesso">ACOMPANHAR PEDIDO</a>
          <a href="../index.html" class="link-home">VOLTAR PARA A LOJA</a>
        </div>
      </div>
    </main>

    <gritta-footer></gritta-footer>
  </body>
</html>
